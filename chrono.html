<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chrono — Rita</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f0eff4">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f0eff4;
    --bg2:     #e9e8ef;
    --bg3:     #e1e0e9;
    --border:  rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13);
    --text:    #1a1820;
    --muted:   #75707e;
    --dim:     #a8a3b2;
    --accent:  #b5377a;
    --accent-bg: rgba(181,55,122,0.08);
    --yellow:     #b89600;
    --yellow-bg:  rgba(210,172,0,0.10);
    --yellow-border: rgba(210,172,0,0.30);
    --teal:    #0e7a8a;
    --teal-bg: rgba(14,122,138,0.09);
    --green:   #1a9e4a;
    --green-bg:rgba(26,158,74,0.10);
    --red:     #c93a1f;
    --red-bg:  rgba(201,58,31,0.10);
    --purple:  #7c3aed;
    --purp-bg: rgba(124,58,237,0.09);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.6; min-height:100vh; }

  /* ── TOP BAR ── */
  .top-bar {
    background:var(--bg2);
    border-bottom:1px solid var(--border2);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
  }
  .back-btn {
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    background:none;
    border:1px solid var(--border2);
    border-radius:6px;
    padding:6px 14px;
    cursor:pointer;
    text-decoration:none;
    transition:all .18s;
    min-height:36px;
    display:flex;
    align-items:center;
  }
  .back-btn:hover { color:var(--text); border-color:var(--accent); }
  .top-title {
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .lang-mini {
    display:flex;
    gap:4px;
  }
  .lang-mini button {
    font-family:'DM Mono',monospace;
    font-size:9px;
    font-weight:600;
    letter-spacing:.08em;
    background:none;
    border:1px solid var(--border2);
    border-radius:4px;
    color:var(--muted);
    padding:3px 8px;
    cursor:pointer;
    transition:all .18s;
  }
  .lang-mini button.active { background:var(--yellow-bg); border-color:var(--yellow-border); color:var(--yellow); }

  /* ── PAGES ── */
  .page { display:none; padding:24px 20px 60px; max-width:600px; margin:0 auto; }
  .page.active { display:block; animation:fadeUp .3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ── CHOICE PAGE ── */
  .choice-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:38px;
    letter-spacing:.04em;
    color:var(--text);
    margin-bottom:6px;
  }
  .choice-title span { color:var(--accent); }
  .choice-sub {
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:32px;
  }
  .session-cards { display:flex; flex-direction:column; gap:12px; }
  .session-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    cursor:pointer;
    transition:all .2s;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .session-card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .session-card.thu { border-left:4px solid var(--teal); }
  .session-card.sat { border-left:4px solid var(--yellow); }
  .session-card-info {}
  .session-card-day {
    font-family:'DM Mono',monospace;
    font-size:9px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
  }
  .session-card-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;
    letter-spacing:.04em;
    color:var(--text);
    margin-bottom:4px;
  }
  .session-card.thu .session-card-name { color:var(--teal); }
  .session-card.sat .session-card-name { color:var(--yellow); }
  .session-card-meta {
    font-size:11px;
    color:var(--muted);
    font-family:'DM Mono',monospace;
  }
  .session-card-arrow {
    font-size:20px;
    color:var(--dim);
    flex-shrink:0;
  }

  /* ── CHRONO PAGE ── */
  .chrono-header { margin-bottom:20px; }
  .chrono-day {
    font-family:'DM Mono',monospace;
    font-size:9px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:2px;
  }
  .chrono-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:32px;
    letter-spacing:.04em;
    color:var(--text);
  }

  /* Progress bar */
  .progress-wrap {
    background:var(--bg3);
    border-radius:4px;
    height:4px;
    margin-bottom:20px;
    overflow:hidden;
  }
  .progress-bar {
    height:100%;
    border-radius:4px;
    transition:width .1s linear;
    background:var(--teal);
  }
  .progress-bar.rest { background:var(--accent); }
  .progress-bar.done { background:var(--green); }

  /* Phase indicator */
  .phase-badge {
    display:inline-block;
    font-family:'DM Mono',monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:8px;
    margin-bottom:8px;
  }
  .phase-work { background:var(--teal-bg); color:var(--teal); border:1px solid rgba(14,122,138,.25); }
  .phase-rest { background:var(--red-bg);  color:var(--red);  border:1px solid rgba(201,58,31,.25); }
  .phase-done { background:var(--green-bg);color:var(--green);border:1px solid rgba(26,158,74,.25); }
  .phase-ready{ background:var(--purp-bg); color:var(--purple);border:1px solid rgba(124,58,237,.25); }

  /* Big timer */
  .timer-display {
    font-family:'Bebas Neue',sans-serif;
    font-size:100px;
    letter-spacing:.02em;
    line-height:1;
    color:var(--text);
    text-align:center;
    margin:8px 0 4px;
    transition:color .2s;
  }
  .timer-display.work { color:var(--teal); }
  .timer-display.rest { color:var(--red); }
  .timer-display.done { color:var(--green); }

  /* Current exercise */
  .current-exo {
    text-align:center;
    margin-bottom:20px;
  }
  .current-exo-label {
    font-family:'DM Mono',monospace;
    font-size:9px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:4px;
  }
  .current-exo-name {
    font-size:16px;
    font-weight:600;
    color:var(--text);
    line-height:1.3;
  }
  .current-exo-next {
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
    font-family:'DM Mono',monospace;
  }

  /* Round indicator */
  .round-info {
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:20px;
  }
  .round-dot {
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--bg3);
    border:1px solid var(--border2);
    transition:background .2s;
  }
  .round-dot.done { background:var(--teal); border-color:var(--teal); }
  .round-dot.active { background:var(--accent); border-color:var(--accent); }

  /* Controls */
  .controls {
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:24px;
  }
  .btn-start {
    font-family:'DM Mono',monospace;
    font-size:12px;
    font-weight:600;
    letter-spacing:.1em;
    text-transform:uppercase;
    background:var(--teal);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:14px 32px;
    cursor:pointer;
    transition:opacity .18s;
    min-height:48px;
    flex:1;
  }
  .btn-start.yellow { background:var(--yellow); }
  .btn-start:hover { opacity:.85; }
  .btn-reset {
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:none;
    color:var(--muted);
    border:1px solid var(--border2);
    border-radius:10px;
    padding:14px 20px;
    cursor:pointer;
    transition:all .18s;
    min-height:48px;
  }
  .btn-reset:hover { color:var(--text); border-color:var(--accent); }

  /* Exercise list */
  .exo-section-label {
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .exo-section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .exo-list { display:flex; flex-direction:column; gap:6px; }
  .exo-item {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    transition:all .2s;
  }
  .exo-item.active-exo {
    background:var(--teal-bg);
    border-color:rgba(14,122,138,.3);
  }
  .exo-item.active-exo.yellow { background:var(--yellow-bg); border-color:var(--yellow-border); }
  .exo-num {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px;
    color:var(--dim);
    min-width:20px;
    text-align:center;
    line-height:1;
  }
  .exo-item.active-exo .exo-num { color:var(--teal); }
  .exo-item.active-exo.yellow .exo-num { color:var(--yellow); }
  .exo-item-name { font-size:13px; font-weight:500; color:var(--text); }
  .exo-item-done { margin-left:auto; font-size:14px; opacity:0; transition:opacity .2s; }
  .exo-item.completed .exo-item-done { opacity:1; }

  /* Finish message */
  .finish-msg {
    text-align:center;
    padding:30px 0;
  }
  .finish-emoji { font-size:48px; margin-bottom:12px; }
  .finish-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:36px;
    letter-spacing:.04em;
    color:var(--green);
    margin-bottom:8px;
  }
  .finish-sub { font-size:13px; color:var(--muted); }

  @media (max-width: 380px) {
    .timer-display { font-size:80px; }
    .choice-title { font-size:30px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← <span data-i18n="back">Back</span></a>
  <span class="top-title" data-i18n="top_title">Chrono</span>
  <div class="lang-mini">
    <button onclick="setLang('en')" class="active">EN</button>
    <button onclick="setLang('hu')">HU</button>
  </div>
</div>

<!-- PAGE 1: CHOICE -->
<div class="page active" id="page-choice">
  <div class="choice-title">TABATA<br><span data-i18n="choice_title">TIMER</span></div>
  <div class="choice-sub" data-i18n="choice_sub">Choose your session</div>
  <div class="session-cards">

    <div class="session-card thu" onclick="loadSession('thu')">
      <div class="session-card-info">
        <div class="session-card-day" data-i18n="thu_day">Thursday</div>
        <div class="session-card-name" data-i18n="thu_name">HIIT CARDIO</div>
        <div class="session-card-meta" data-i18n="thu_meta">8 exercises · 20s work / 10s rest · 5 rounds</div>
      </div>
      <div class="session-card-arrow">→</div>
    </div>

    <div class="session-card sat" onclick="loadSession('sat')">
      <div class="session-card-info">
        <div class="session-card-day" data-i18n="sat_day">Saturday</div>
        <div class="session-card-name" data-i18n="sat_name">HIIT + GLUTES</div>
        <div class="session-card-meta" data-i18n="sat_meta">3 exercises · 45s work / 15s rest · 5 rounds</div>
      </div>
      <div class="session-card-arrow">→</div>
    </div>

  </div>
</div>

<!-- PAGE 2: CHRONO -->
<div class="page" id="page-chrono">

  <div class="chrono-header">
    <div class="chrono-day" id="chrono-day-label"></div>
    <div class="chrono-name" id="chrono-session-name"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div style="text-align:center; margin-bottom:4px;">
    <span class="phase-badge phase-ready" id="phase-badge">READY</span>
  </div>

  <div class="timer-display" id="timer-display">GO</div>

  <div class="current-exo">
    <div class="current-exo-label" data-i18n="exo_label">Exercise</div>
    <div class="current-exo-name" id="current-exo-name">—</div>
    <div class="current-exo-next" id="next-exo-name"></div>
  </div>

  <div class="round-info" id="round-dots"></div>

  <div class="controls">
    <button class="btn-start" id="btn-start" onclick="toggleTimer()" data-i18n="btn_start">START</button>
    <button class="btn-reset" onclick="resetTimer()" data-i18n="btn_reset">Reset</button>
  </div>

  <div class="exo-section-label" data-i18n="exo_list_label">Exercises</div>
  <div class="exo-list" id="exo-list"></div>

</div>

<script>
// ── TRANSLATIONS ───────────────────────────────────────────────────
const T = {
  en: {
    back: 'Back', top_title: 'Chrono',
    choice_title: 'TIMER', choice_sub: 'Choose your session',
    thu_day: 'Thursday', thu_name: 'HIIT CARDIO', thu_meta: '8 exercises · 20s work / 10s rest · 5 rounds',
    sat_day: 'Saturday', sat_name: 'HIIT + GLUTES', sat_meta: '3 exercises · 45s work / 15s rest · 5 rounds',
    exo_label: 'Exercise', next_label: 'Next →',
    round_label: 'Round', of_label: 'of',
    btn_start: 'START', btn_pause: 'PAUSE', btn_resume: 'RESUME', btn_reset: 'Reset',
    phase_ready: 'READY', phase_work: 'WORK', phase_rest: 'REST', phase_done: 'DONE',
    exo_list_label: 'Exercises',
    finish_title: 'SESSION COMPLETE!', finish_sub: 'Great work 💪',
    next_exo_prefix: 'Next →',
    thu_exos: ['Jumping jacks','Mountain climbers','Squat jumps','High knees','Modified burpees','Reverse lunges','Push-ups','Plank shoulder taps'],
    sat_exos: ['Squat jumps','Burpees','Jump lunges'],
    thu_day_label: 'THU · HIIT',
    sat_day_label: 'SAT · HIIT',
  },
  hu: {
    back: 'Vissza', top_title: 'Időzítő',
    choice_title: 'IDŐZÍTŐ', choice_sub: 'Válaszd ki az edzésedet',
    thu_day: 'Csütörtök', thu_name: 'HIIT KARDIÓZÁS', thu_meta: '8 gyakorlat · 20mp munka / 10mp pihenő · 5 kör',
    sat_day: 'Szombat', sat_name: 'HIIT + FENÉK', sat_meta: '3 gyakorlat · 45mp munka / 15mp pihenő · 5 kör',
    exo_label: 'Gyakorlat', next_label: 'Következő →',
    round_label: 'Kör', of_label: '/',
    btn_start: 'INDÍTÁS', btn_pause: 'SZÜNET', btn_resume: 'FOLYTATÁS', btn_reset: 'Visszaállít',
    phase_ready: 'KÉSZ', phase_work: 'MUNKA', phase_rest: 'PIHENŐ', phase_done: 'KÉSZ',
    exo_list_label: 'Gyakorlatok',
    finish_title: 'EDZÉS TELJESÍTVE!', finish_sub: 'Szuper munka 💪',
    next_exo_prefix: 'Következő →',
    thu_exos: ['Jumping jacks','Hegyimászó','Guggolóugrás','High knees','Módosított burpee','Hátralépős kitörések','Fekvőtámasz','Plank válltapogatás'],
    sat_exos: ['Guggolóugrás','Burpee','Ugrókilépés'],
    thu_day_label: 'CSÜ · HIIT',
    sat_day_label: 'SZO · HIIT',
  }
};

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-mini button').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
  const d = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (d[k] !== undefined) el.textContent = d[k];
  });
  // Update dynamic labels if on chrono page
  if (currentSession) {
    renderExoList();
    updateDisplay();
  }
}

// ── SESSION DEFINITIONS ────────────────────────────────────────────
const SESSIONS = {
  thu: { workTime: 20, restTime: 10, rounds: 5, color: 'teal', btnClass: '' },
  sat: { workTime: 45, restTime: 15, rounds: 5, color: 'yellow', btnClass: 'yellow' },
};

// ── TIMER STATE ────────────────────────────────────────────────────
let currentSession = null;
let sessionKey = null;
let isRunning = false;
let intervalId = null;
let timeLeft = 0;
let currentPhase = 'ready'; // ready | work | rest | done
let currentRound = 0;
let currentExoIndex = 0;
let totalSteps = 0;
let stepsDone = 0;

// Prepare a countdown with 3-2-1 start
let countdownActive = false;
let countdownVal = 0;

function loadSession(key) {
  sessionKey = key;
  currentSession = SESSIONS[key];
  resetTimer();
  showPage('page-chrono');

  const d = T[currentLang];
  document.getElementById('chrono-day-label').textContent = key === 'thu' ? d.thu_day_label : d.sat_day_label;
  document.getElementById('chrono-session-name').textContent = key === 'thu' ? d.thu_name : d.sat_name;

  // Style start button
  const btn = document.getElementById('btn-start');
  btn.className = 'btn-start' + (currentSession.btnClass ? ' ' + currentSession.btnClass : '');

  renderExoList();
  renderRoundDots();
  updateDisplay();
}

function getExos() {
  const d = T[currentLang];
  return sessionKey === 'thu' ? d.thu_exos : d.sat_exos;
}

function renderExoList() {
  const exos = getExos();
  const list = document.getElementById('exo-list');
  const isYellow = sessionKey === 'sat';
  list.innerHTML = exos.map((name, i) => `
    <div class="exo-item ${i === currentExoIndex && currentPhase === 'work' ? 'active-exo' + (isYellow ? ' yellow' : '') : ''} ${i < currentExoIndex || (currentPhase !== 'ready' && i < currentExoIndex) ? 'completed' : ''}" id="exo-item-${i}">
      <div class="exo-num">${i+1}</div>
      <div class="exo-item-name">${name}</div>
      <div class="exo-item-done">✓</div>
    </div>
  `).join('');
}

function renderRoundDots() {
  const dots = document.getElementById('round-dots');
  dots.innerHTML = Array.from({length: currentSession.rounds}, (_, i) => `
    <div class="round-dot ${i < currentRound ? 'done' : i === currentRound ? 'active' : ''}"></div>
  `).join('');
}

function updateDisplay() {
  if (!currentSession) return;
  const d = T[currentLang];
  const exos = getExos();
  const badge = document.getElementById('phase-badge');
  const timerEl = document.getElementById('timer-display');
  const startBtn = document.getElementById('btn-start');
  const prog = document.getElementById('progress-bar');

  if (currentPhase === 'ready') {
    badge.className = 'phase-badge phase-ready';
    badge.textContent = d.phase_ready;
    timerEl.className = 'timer-display';
    timerEl.textContent = countdownActive ? countdownVal : 'GO';
    document.getElementById('current-exo-name').textContent = exos[0] || '—';
    document.getElementById('next-exo-name').textContent = exos[1] ? d.next_exo_prefix + ' ' + exos[1] : '';
    prog.style.width = '0%';
    prog.className = 'progress-bar';
    startBtn.textContent = isRunning ? d.btn_pause : d.btn_start;

  } else if (currentPhase === 'work') {
    badge.className = 'phase-badge phase-work';
    badge.textContent = d.phase_work + ' · ' + d.round_label + ' ' + (currentRound + 1) + ' ' + d.of_label + ' ' + currentSession.rounds;
    timerEl.className = 'timer-display work';
    timerEl.textContent = timeLeft;
    document.getElementById('current-exo-name').textContent = exos[currentExoIndex] || '—';
    const nextIdx = currentExoIndex + 1 < exos.length ? currentExoIndex + 1 : (currentRound + 1 < currentSession.rounds ? 0 : null);
    document.getElementById('next-exo-name').textContent = nextIdx !== null ? d.next_exo_prefix + ' ' + exos[nextIdx] : '';
    const pct = ((currentSession.workTime - timeLeft) / currentSession.workTime) * 100;
    prog.style.width = pct + '%';
    prog.className = 'progress-bar';
    startBtn.textContent = isRunning ? d.btn_pause : d.btn_resume;

  } else if (currentPhase === 'rest') {
    badge.className = 'phase-badge phase-rest';
    badge.textContent = d.phase_rest;
    timerEl.className = 'timer-display rest';
    timerEl.textContent = timeLeft;
    const nextIdx = currentExoIndex < exos.length ? currentExoIndex : 0;
    document.getElementById('current-exo-name').textContent = d.next_exo_prefix + ' ' + (exos[nextIdx] || '—');
    document.getElementById('next-exo-name').textContent = '';
    const pct = ((currentSession.restTime - timeLeft) / currentSession.restTime) * 100;
    prog.style.width = pct + '%';
    prog.className = 'progress-bar rest';
    startBtn.textContent = isRunning ? d.btn_pause : d.btn_resume;

  } else if (currentPhase === 'done') {
    badge.className = 'phase-badge phase-done';
    badge.textContent = d.phase_done;
    timerEl.className = 'timer-display done';
    timerEl.textContent = '✓';
    document.getElementById('current-exo-name').textContent = d.finish_title;
    document.getElementById('next-exo-name').textContent = d.finish_sub;
    prog.style.width = '100%';
    prog.className = 'progress-bar done';
    startBtn.textContent = d.btn_start;
    renderRoundDots();
  }

  // Update exo list highlighting
  renderExoList();
  renderRoundDots();
}

function toggleTimer() {
  if (currentPhase === 'done') { resetTimer(); return; }
  if (!isRunning) {
    if (currentPhase === 'ready') {
      startCountdown();
    } else {
      isRunning = true;
      runInterval();
    }
  } else {
    isRunning = false;
    clearInterval(intervalId);
    updateDisplay();
  }
}

function startCountdown() {
  countdownActive = true;
  countdownVal = 3;
  isRunning = true;
  const d = T[currentLang];
  const timerEl = document.getElementById('timer-display');
  timerEl.textContent = countdownVal;
  document.getElementById('btn-start').textContent = d.btn_pause;

  intervalId = setInterval(() => {
    countdownVal--;
    if (countdownVal > 0) {
      timerEl.textContent = countdownVal;
    } else {
      clearInterval(intervalId);
      countdownActive = false;
      // Start first work phase
      currentPhase = 'work';
      currentRound = 0;
      currentExoIndex = 0;
      timeLeft = currentSession.workTime;
      runInterval();
      updateDisplay();
    }
  }, 1000);
}

function runInterval() {
  clearInterval(intervalId);
  intervalId = setInterval(tick, 1000);
}

function tick() {
  if (!isRunning) return;
  timeLeft--;
  if (timeLeft <= 0) {
    advance();
  } else {
    updateDisplay();
  }
}

function advance() {
  const exos = getExos();

  if (currentPhase === 'work') {
    // Mark current exo as done if last round OR move to rest
    beep('rest');
    currentPhase = 'rest';
    timeLeft = currentSession.restTime;
    // Advance exo index AFTER rest
  } else if (currentPhase === 'rest') {
    beep('work');
    // Advance to next exercise
    currentExoIndex++;
    if (currentExoIndex >= exos.length) {
      // Finished all exercises in this round
      currentRound++;
      currentExoIndex = 0;
      if (currentRound >= currentSession.rounds) {
        // ALL DONE
        currentPhase = 'done';
        isRunning = false;
        clearInterval(intervalId);
        beep('done');
        updateDisplay();
        return;
      }
    }
    currentPhase = 'work';
    timeLeft = currentSession.workTime;
  }
  updateDisplay();
}

function resetTimer() {
  isRunning = false;
  clearInterval(intervalId);
  countdownActive = false;
  currentPhase = 'ready';
  currentRound = 0;
  currentExoIndex = 0;
  timeLeft = 0;
  if (currentSession) {
    const d = T[currentLang];
    document.getElementById('btn-start').textContent = d.btn_start;
    updateDisplay();
  }
}

// ── BEEP ───────────────────────────────────────────────────────────
let audioCtx = null;
function beep(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'work') {
      osc.frequency.value = 880; // high — work starts
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'rest') {
      osc.frequency.value = 440; // low — rest
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'done') {
      // Victory melody: 3 ascending beeps
      [523, 659, 784].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        o.start(t); o.stop(t + 0.25);
      });
    }
  } catch(e) {}
}

// ── NAVIGATION ─────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Init
setLang('en');
